<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Left exclamation: small, tilted -12° -->
  <g transform="translate(30, 50) rotate(-12)">
    <rect x="-5" y="-21" width="10" height="27" rx="3" fill="#0f172a"/>
    <rect x="-5" y="10" width="10" height="10" rx="2.5" fill="#0f172a"/>
  </g>

  <!-- Center exclamation: large, tilted +5° -->
  <g transform="translate(52, 45) rotate(5)">
    <rect x="-8" y="-27" width="16" height="38" rx="4" fill="#0f172a"/>
    <rect x="-7.5" y="16" width="15" height="14" rx="3.5" fill="#0f172a"/>
  </g>

  <!-- Right exclamation: small, tilted +20° -->
  <g transform="translate(68, 57) rotate(20)">
    <rect x="-4" y="-14" width="8" height="18" rx="2.5" fill="#0f172a"/>
    <rect x="-4" y="8" width="8" height="8" rx="2" fill="#0f172a"/>
  </g>
</svg>
